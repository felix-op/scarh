services:
  # Servicio de la Aplicación Django
  web:
    image: felixop/scarh:latest
    container_name: scarh_api
    command: >
      sh -c "python manage.py migrate &&
       python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}